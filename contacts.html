<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - RTPM-DSHS</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <header id="header">
        <a href="index.html" class="logo-container">
            <img src="img/logo (3).png" alt="Logo" style="width: 45px;">
            <h2 class="logo-text">RTPM-DSHS</h2>
        </a>
        <ul id="navbar">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="programs.html">Programs</a></li>
            <li><a href="photos.html">Photos</a></li>
            <li><a class="active" href="contact.html">Contact</a></li>
            <li><a href="developers.html">Developers</a></li>
        </ul>
    </header>

    <section id="contact-container">
        <div class="contact-wrapper">
            <div class="contact-info">
                <h1>Get in <span class="pink-text">Touch</span></h1>
                <p>Have questions about admissions or school programs? We are here to help.</p>
                
                <div class="info-box">
                    <div class="item">
                        <span class="icon">📍</span>
                        <div>
                            <h4>Location</h4>
                            <p>Daro, Dumaguete City, Negros Oriental</p>
                        </div>
                    </div>
                    <div class="item">
                        <span class="icon">📞</span>
                        <div>
                            <h4>Phone</h4>
                            <p>(035) 225 4786</p>
                        </div>
                    </div>
                    <div class="item">
                        <span class="icon">✉️</span>
                        <div>
                            <h4>Email</h4>
                            <p>rtpmdshs@deped.gov.ph</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="contact-form">
                <form>
                    <div class="input-group">
                        <input type="text" placeholder="Full Name" required>
                    </div>
                    <div class="input-group">
                        <input type="email" placeholder="Email Address" required>
                    </div>
                    <div class="input-group">
                        <textarea placeholder="Your Message" rows="5" required></textarea>
                    </div>
                    <button type="submit" class="send-btn">Send Message</button>
                </form>
            </div>
        </div>
    </section>

</body>
</html>
